<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">

<body>
<!--header and progress ring-->
    <div class="header">
        <h2>Task Manager</h2>

    <div class="theme-toggle">
        <button class="btn" id="light">Light Mode</button>

    </div>

            <span id="progress-text">0/0</span>
        </div>
        </div>
        
        <div class="right-side">
